<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATECH — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Dashboard Layout ── */
    .dash-wrapper {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* Header */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.25rem 0 1.5rem;
      border-bottom: 1px solid var(--border-glow);
      margin-bottom: 2rem;
    }

    .dash-logo { display: flex; flex-direction: column; }

    .dash-logo .logo-text { font-size: 1.6rem; letter-spacing: 0.3em; }
    .dash-logo .logo-sub  { font-size: 0.62rem; margin-top: 0.15rem; }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 20px;
      padding: 0.35rem 0.9rem 0.35rem 0.6rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .user-dot {
      width: 8px; height: 8px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .user-name-badge { color: var(--accent-cyan); font-weight: 500; }

    /* Action cards */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .action-card {
      cursor: pointer;
      text-align: center;
      padding: 1.75rem 1rem;
      border: 1px solid var(--border-glow);
      border-radius: 8px;
      background: var(--bg-card);
      transition: background 0.25s, box-shadow 0.25s, transform 0.15s, border-color 0.25s;
      user-select: none;
    }

    .action-card:hover, .action-card.active {
      background: var(--bg-card-hover);
      border-color: var(--accent-cyan);
      box-shadow: 0 0 20px rgba(0,212,200,.2), 0 4px 16px rgba(0,0,0,.5);
      transform: translateY(-2px);
    }

    .action-card.active {
      border-left: 3px solid var(--accent-cyan);
    }

    .action-icon {
      font-size: 1.8rem;
      margin-bottom: 0.65rem;
      display: block;
    }

    .action-label {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--accent-cyan);
      text-transform: uppercase;
    }

    .action-desc {
      font-size: 0.73rem;
      color: var(--text-secondary);
      margin-top: 0.3rem;
    }

    /* Content panel */
    #content-panel { min-height: 200px; }

    /* Inline form */
    .form-panel {
      animation: fadeInUp 0.3s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-panel .card { max-width: 520px; }

    /* Repeat prompt */
    .repeat-prompt {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 1rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-left: 3px solid var(--success);
      border-radius: 8px;
      animation: fadeInUp 0.3s ease;
    }

    .repeat-prompt p {
      flex: 1;
      font-size: 0.88rem;
      color: var(--text-secondary);
      min-width: 160px;
    }

    .repeat-prompt .text-success { color: var(--success); }

    /* Task list */
    .task-list { display: flex; flex-direction: column; gap: 0.65rem; }

    .task-list-empty {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      padding: 2.5rem 0;
      font-family: var(--font-mono);
    }

    /* Group header (for all tasks) */
    .group-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1.5rem;
      margin-bottom: 0.6rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border-glow);
    }

    .group-header .group-name {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--accent-cyan);
      letter-spacing: 0.1em;
    }

    .group-count {
      font-size: 0.72rem;
      background: rgba(0,212,200,.12);
      border: 1px solid var(--border-glow);
      color: var(--accent-cyan);
      border-radius: 10px;
      padding: 0.1rem 0.5rem;
    }

    /* Exit footer */
    .exit-area {
      margin-top: 3rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border-glow);
      display: flex;
      justify-content: flex-end;
    }

    /* Loading overlay */
    .panel-loader {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
      padding: 2rem 0;
    }

    #msg-global { margin-bottom: 1.25rem; }

    @media (max-width: 480px) {
      .action-grid { grid-template-columns: 1fr; }
      .dash-header  { justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="dash-wrapper">

    <!-- Header -->
    <header class="dash-header">
      <div class="dash-logo">
        <span class="logo-text">ATECH</span>
        <span class="logo-sub">Task Management System</span>
      </div>
      <div class="user-badge">
        <span class="user-dot"></span>
        <span id="user-display" class="user-name-badge">Loading...</span>
      </div>
    </header>

    <!-- Global messages -->
    <div id="msg-global"></div>

    <!-- Action selector -->
    <div class="action-grid">
      <div class="action-card" id="card-add" onclick="showPanel('add')">
        <span class="action-icon">+</span>
        <div class="action-label">Add Task</div>
        <div class="action-desc">Create a new task for your queue</div>
      </div>
      <div class="action-card" id="card-my" onclick="showPanel('my')">
        <span class="action-icon">&#9776;</span>
        <div class="action-label">My Tasks</div>
        <div class="action-desc">View and manage your tasks</div>
      </div>
      <div class="action-card" id="card-all" onclick="showPanel('all')">
        <span class="action-icon">&#9881;</span>
        <div class="action-label">All Tasks</div>
        <div class="action-desc">View tasks across all users</div>
      </div>
    </div>

    <!-- Dynamic content area -->
    <div id="content-panel"></div>

    <!-- Exit -->
    <div class="exit-area">
      <button class="btn btn-ghost" onclick="exitSystem()">
        &#x2190; Exit / Change User
      </button>
    </div>

  </div>

  <script>
    const API_BASE = 'http://localhost:8080';

    /* ── Session ─────────────────────────── */
    const userId   = sessionStorage.getItem('userId');
    const userName = sessionStorage.getItem('userName');

    if (!userId) { window.location.href = 'index.html'; }

    document.getElementById('user-display').textContent = userName || 'Unknown';

    /* ── Helpers ─────────────────────────── */
    function showGlobal(text, type = 'error') {
      document.getElementById('msg-global').innerHTML =
        `<div class="alert alert-${type}">${text}</div>`;
      setTimeout(() => { document.getElementById('msg-global').innerHTML = ''; }, 4500);
    }

    function setActiveCard(name) {
      ['add','my','all'].forEach(n => {
        document.getElementById(`card-${n}`).classList.toggle('active', n === name);
      });
    }

    function loader() {
      return `<div class="panel-loader">
        <span class="spinner"></span>
        <span>Fetching data...</span>
      </div>`;
    }

    async function apiFetch(url, opts = {}) {
      const res = await fetch(API_BASE + url, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      if (!res.ok) {
        const msg = await res.text().catch(() => '');
        throw new Error(msg || `Server error (${res.status})`);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    /* ── Panel router ────────────────────── */
    function showPanel(name) {
      setActiveCard(name);
      const panel = document.getElementById('content-panel');
      if (name === 'add') renderAddPanel(panel);
      if (name === 'my')  renderMyTasks(panel);
      if (name === 'all') renderAllTasks(panel);
    }

    /* ── Add Task Panel ──────────────────── */
    function renderAddPanel(panel) {
      panel.innerHTML = `
        <div class="form-panel">
          <div class="section-title">New Task</div>
          <div class="card">
            <form id="task-form" autocomplete="off">
              <div class="form-group">
                <label for="task-desc">Task Description</label>
                <textarea
                  id="task-desc"
                  placeholder="Describe the task..."
                  maxlength="500"
                  required
                ></textarea>
              </div>
              <div class="flex gap-2 items-center" style="flex-wrap:wrap;">
                <button type="submit" class="btn btn-primary" id="add-btn">
                  <span id="add-label">Add Task</span>
                  <span id="add-spinner" class="spinner" style="display:none;"></span>
                </button>
              </div>
              <div id="add-msg" class="mt-2"></div>
            </form>
          </div>
        </div>`;

      document.getElementById('task-form').addEventListener('submit', submitTask);
      document.getElementById('task-desc').focus();
    }

    async function submitTask(e) {
      e.preventDefault();
      const desc    = document.getElementById('task-desc').value.trim();
      const addBtn  = document.getElementById('add-btn');
      const label   = document.getElementById('add-label');
      const spinner = document.getElementById('add-spinner');
      const msgEl   = document.getElementById('add-msg');

      if (!desc) return;

      addBtn.disabled = true;
      label.textContent = 'Adding...';
      spinner.style.display = 'inline-block';
      msgEl.innerHTML = '';

      try {
        const body = JSON.stringify({ usuario: { id: Number(sessionStorage.getItem('userId')) }, descricao: desc });
        console.log('[submitTask] POST /tarefas body:', body);
        await apiFetch('/tarefas', {
          method: 'POST',
          body,
        });

        showRepeatPrompt();

      } catch (err) {
        msgEl.innerHTML = `<div class="alert alert-error">Failed: ${err.message}</div>`;
        addBtn.disabled = false;
        label.textContent = 'Add Task';
        spinner.style.display = 'none';
      }
    }

    function showRepeatPrompt() {
      const panel = document.getElementById('content-panel');
      panel.innerHTML = `
        <div class="repeat-prompt">
          <p><span class="text-success">&#10003; Task added.</span> Add another task?</p>
          <div class="flex gap-1">
            <button class="btn btn-sm btn-primary" onclick="showPanel('add')">Yes</button>
            <button class="btn btn-sm btn-ghost"   onclick="showPanel('my')">No — View My Tasks</button>
          </div>
        </div>`;
    }

    /* ── My Tasks Panel ──────────────────── */
    async function renderMyTasks(panel) {
      panel.innerHTML = `<div class="section-title">My Tasks</div>${loader()}`;

      try {
        const tasks = await apiFetch('/tarefas');
        const mine  = tasks.filter(t => String(t.usuario?.id) === String(userId));

        panel.innerHTML = `<div class="section-title">My Tasks</div>
          <div id="my-task-list">${buildTaskList(mine, true)}</div>`;

      } catch (err) {
        panel.innerHTML = `<div class="section-title">My Tasks</div>
          <div class="alert alert-error">Failed to load tasks: ${err.message}</div>`;
      }
    }

    /* ── All Tasks Panel ─────────────────── */
    async function renderAllTasks(panel) {
      panel.innerHTML = `<div class="section-title">All Tasks</div>${loader()}`;

      try {
        const tasks = await apiFetch('/tarefas');

        if (!tasks.length) {
          panel.innerHTML = `<div class="section-title">All Tasks</div>
            <div class="task-list-empty">// No tasks found in the system</div>`;
          return;
        }

        // Group by user
        const groups = {};
        tasks.forEach(t => {
          const uid   = t.usuario?.id   || 'unknown';
          const uname = t.usuario?.nome || 'Unknown User';
          if (!groups[uid]) groups[uid] = { name: uname, tasks: [] };
          groups[uid].tasks.push(t);
        });

        let html = `<div class="section-title">All Tasks — ${tasks.length} total</div>`;

        Object.values(groups).forEach(g => {
          html += `
            <div class="group-header">
              <span class="group-name">&#9654; ${escHtml(g.name)}</span>
              <span class="group-count">${g.tasks.length}</span>
            </div>
            <div class="task-list">${g.tasks.map(t => taskItemHtml(t, false)).join('')}</div>`;
        });

        panel.innerHTML = html;

        // Stagger animations
        document.querySelectorAll('.task-item').forEach((el, i) => {
          el.style.animationDelay = `${i * 0.05}s`;
        });

      } catch (err) {
        panel.innerHTML = `<div class="section-title">All Tasks</div>
          <div class="alert alert-error">Failed to load tasks: ${err.message}</div>`;
      }
    }

    /* ── Task list builder ───────────────── */
    function buildTaskList(tasks, showDelete) {
      if (!tasks.length) {
        return `<div class="task-list-empty">// No tasks found</div>`;
      }
      return `<div class="task-list">${tasks.map(t => taskItemHtml(t, showDelete)).join('')}</div>`;
    }

    function taskItemHtml(task, showDelete) {
      const del = showDelete
        ? `<button class="btn btn-icon" title="Delete task"
             onclick="deleteTask(${task.id}, this)" aria-label="Delete">&#128465;</button>`
        : '';
      return `
        <div class="task-item" id="task-${task.id}">
          <div>
            <div class="task-desc">${escHtml(task.descricao)}</div>
          </div>
          ${del}
        </div>`;
    }

    /* ── Delete task ─────────────────────── */
    async function deleteTask(id, btn) {
      btn.disabled = true;
      btn.textContent = '...';
      const item = document.getElementById(`task-${id}`);

      try {
        await apiFetch(`/tarefas/${id}`, { method: 'DELETE' });

        item.style.transition = 'opacity 0.3s, transform 0.3s';
        item.style.opacity    = '0';
        item.style.transform  = 'translateX(20px)';
        setTimeout(() => item.remove(), 320);

        showGlobal('Task deleted.', 'success');

      } catch (err) {
        showGlobal(`Delete failed: ${err.message}`);
        btn.disabled    = false;
        btn.textContent = '🗑';
      }
    }

    /* ── Exit ────────────────────────────── */
    function exitSystem() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }

    /* ── Util ────────────────────────────── */
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
